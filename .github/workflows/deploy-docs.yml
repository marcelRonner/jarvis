name: Build MKdocs Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PlantUML
        run: |
          sudo apt-get update && sudo apt-get install -y default-jre graphviz
          curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2024.8/plantuml-1.2024.8.jar

      - name: Generate PlantUML diagrams
        run: |
          PUML="java -jar ${{ github.workspace }}/plantuml.jar"
          OUT="${{ github.workspace }}/docs/assets/img"
          $PUML -tsvg -o "$OUT" docs/domain_model/domainModel.puml
          $PUML -tsvg -o "$OUT" docs/use_case/useCaseDiagram.puml
          $PUML -tsvg -o "$OUT" docs/use_case/authenticate/authenticate.puml
          $PUML -tsvg -o "$OUT" docs/use_case/withdraw_cash/withdrawCash.puml
          $PUML -tsvg -o "$OUT" docs/use_case/check_balance/checkBalance.puml
          $PUML -tsvg -o "$OUT" docs/use_case/transfer_funds/transferFunds.puml
          $PUML -tsvg -o "$OUT" docs/use_case/print_receipt/printReceipt.puml
          $PUML -tsvg -o "$OUT" docs/state_chart/transactionStateChart.puml

      - name: Build MkDocs
        run: mkdocs build
